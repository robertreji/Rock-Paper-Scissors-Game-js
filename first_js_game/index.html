<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="output.css">
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background:
                radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.35), transparent 28%),
                radial-gradient(circle at 100% 20%, rgba(34, 211, 238, 0.25), transparent 30%),
                linear-gradient(180deg, #020617 0%, #0b1224 100%);
            color: #e2e8f0;
            display: grid;
            place-items: center;
            padding: 1.25rem;
        }

        .app-shell {
            width: min(980px, 100%);
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.7);
            border-radius: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 22px 50px rgba(2, 6, 23, 0.45);
            padding: 1.5rem;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.75rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }

        .title {
            margin: 0;
            font-size: clamp(1.4rem, 3vw, 2rem);
            letter-spacing: 0.02em;
            color: #f8fafc;
        }

        .subtitle {
            margin: 0.35rem 0 0;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: repeat(2, minmax(110px, 1fr));
            gap: 0.75rem;
        }

        .score-card {
            border-radius: 1rem;
            padding: 0.8rem 0.95rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.65);
            text-align: center;
        }

        .score-value {
            margin: 0;
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .score-label {
            margin-top: 0.25rem;
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .moves {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.9rem;
        }

        .move-btn {
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(30, 41, 59, 0.6);
            border-radius: 1.15rem;
            cursor: pointer;
            padding: 0.7rem 0.55rem;
            transition: transform 180ms ease, border-color 180ms ease, background-color 180ms ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.55rem;
        }

        .move-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(125, 211, 252, 0.55);
            background: rgba(37, 99, 235, 0.2);
        }

        .move-btn:active {
            transform: translateY(0);
        }

        .move-btn img {
            width: clamp(90px, 17vw, 150px);
            height: clamp(90px, 17vw, 150px);
            object-fit: cover;
            border-radius: 999px;
            border: 2px solid rgba(148, 163, 184, 0.22);
        }

        .move-name {
            color: #e2e8f0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .status-wrap {
            margin-top: 1.35rem;
            display: flex;
            justify-content: center;
        }

        #status-message {
            margin: 0;
            min-height: 3.1rem;
            min-width: min(100%, 420px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 0.95rem;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(192, 38, 211, 0.38);
            padding: 0.75rem 1rem;
            color: #f8fafc;
            font-size: clamp(1rem, 2.2vw, 1.2rem);
            font-weight: 700;
        }

        @media (max-width: 740px) {
            .moves {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .scoreboard {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div>
                <h1 class="title">Rock Paper Scissors</h1>
                <p class="subtitle">Pick your move and beat the computer.</p>
            </div>

            <section class="scoreboard" aria-label="Scoreboard">
                <article class="score-card">
                    <h2 id="my_score" class="score-value">0</h2>
                    <p class="score-label">You</p>
                </article>
                <article class="score-card">
                    <h2 id="com_score" class="score-value">0</h2>
                    <p class="score-label">Computer</p>
                </article>
            </section>
        </header>

        <section class="moves" aria-label="Choose your move">
            <button id="rock" class="move-btn" aria-label="Choose rock">
                <img src="rock.png" alt="Rock">
                <span class="move-name">Rock</span>
            </button>

            <button id="paper" class="move-btn" aria-label="Choose paper">
                <img src="paper.png" alt="Paper">
                <span class="move-name">Paper</span>
            </button>

            <button id="scissor" class="move-btn" aria-label="Choose scissors">
                <img src="scissors.png" alt="Scissors">
                <span class="move-name">Scissors</span>
            </button>
        </section>

        <div class="status-wrap">
            <p id="status-message">Pick your move</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
